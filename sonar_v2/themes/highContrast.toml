# Sonar built-in theme: HighContrast (design §3 — enterprise / accessibility)
#
# The a11y bar in its purest form: NO color-only signaling anywhere. Every
# state distinction is carried by an attribute channel (reverse / bold / dim /
# underline), so the theme is fully legible on monochrome terminals and to
# color-blind users. This is the documented bar for contributed themes.

[default]
fg = "white"
bg = "black"

[text]
fg = "white"

[input]
fg = "white"
bg = "black"

[input.focused]
fg    = "white"
bg    = "black"
attrs = "reverse|bold"

[input.disabled]
fg    = "white"
attrs = "dim"

[button]
fg    = "white"
bg    = "black"
attrs = "bold"

[button.focused]
fg    = "white"
bg    = "black"
attrs = "reverse|bold"

[button.disabled]
fg    = "white"
attrs = "dim"

[checkbox]
fg = "white"

[checkbox.focused]
fg    = "white"
attrs = "reverse|bold"

[radio]
fg = "white"

[radio.focused]
fg    = "white"
attrs = "reverse|bold"

[radio.selected]
fg    = "white"
attrs = "underline|bold"

[progress]
fg = "white"

[progress.bar]
fg    = "white"
attrs = "reverse"

[spinner]
fg    = "white"
attrs = "bold"

[contentbar]
fg    = "white"
bg    = "black"
attrs = "reverse"

[border]
fg = "white"

[border.focused]
fg    = "white"
attrs = "bold"

[title]
fg    = "white"
attrs = "bold|underline"

[scrollbar]
fg = "white"

[scrollbar.thumb]
fg    = "white"
attrs = "reverse"

[menu.item]
fg = "white"

[menu.item.selected]
fg    = "white"
attrs = "reverse|bold"
