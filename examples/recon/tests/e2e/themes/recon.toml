# Recon shipped theme v2 (DESIGN-2 §4.4). Dotted keys (R10); TOML never JSON.
# Palette discipline (§4.1): ONE accent (cyan) for focus/selection; green/red/
# yellow are reserved semantics; structure is brightBlack; content is white.
# a11y (P7): every state distinction also carries a non-color channel in the UI
# element itself (glyph/text), so `attrs` here is reinforcement, not the sole cue.

[default]
fg = "white"
bg = "black"

# --- chrome bars ---------------------------------------------------------------
[bar.top]
fg = "brightWhite"
bg = "brightBlack"

[bar.top.dirty]
fg    = "brightYellow"
bg    = "brightBlack"
attrs = "bold"

[bar.bottom]
fg = "brightWhite"
bg = "brightBlack"

# --- menu bar ------------------------------------------------------------------
[menu]
fg = "brightWhite"
bg = "brightBlack"

[menu.title]
fg = "brightWhite"
bg = "brightBlack"

[menu.title.focused]
fg    = "black"
bg    = "cyan"
attrs = "bold"

[menu.focused]
fg = "black"
bg = "cyan"

[menu.open]
fg = "black"
bg = "cyan"

[menu.item]
fg = "white"

# --- notices -------------------------------------------------------------------
[notice.info]
fg = "brightCyan"

[notice.success]
fg    = "brightGreen"
attrs = "bold"

[notice.warn]
fg = "black"
bg = "brightYellow"

[notice.error]
fg    = "brightWhite"
bg    = "red"
attrs = "bold"

# --- HTTP method badges (§4.2) -------------------------------------------------
[method.get]
fg    = "brightGreen"
attrs = "bold"

[method.post]
fg    = "brightYellow"
attrs = "bold"

[method.put]
fg    = "brightBlue"
attrs = "bold"

[method.patch]
fg    = "brightMagenta"
attrs = "bold"

[method.delete]
fg    = "brightRed"
attrs = "bold"

[method.head]
fg = "brightCyan"

[method.options]
fg = "cyan"

# --- status classes (§4.3) -----------------------------------------------------
[status.ok]
fg    = "brightGreen"
attrs = "bold"

[status.redirect]
fg    = "brightYellow"
attrs = "bold"

[status.clienterr]
fg    = "brightRed"
attrs = "bold"

[status.servererr]
fg    = "red"
attrs = "bold"

[status.neutral]
fg = "brightBlack"

# --- request URL row + variable preview (§9.3) ---------------------------------
[request.url]
fg = "brightWhite"

[request.url.border]
fg = "brightBlack"

[request.url.focused.border]
fg    = "cyan"
attrs = "bold"

[request.url.hole.resolved]
fg    = "brightBlack"
attrs = "underline"

[request.url.hole.unresolved]
fg    = "brightRed"
attrs = "bold"

# --- editor / TextArea v2 (§7.5) -----------------------------------------------
[editor.gutter]
fg = "brightBlack"

[editor.cursorline]
bg = "brightBlack"

# --- JSON view + body highlight (§8.2) -----------------------------------------
[json.key]
fg = "brightCyan"

[json.string]
fg = "brightGreen"

[json.number]
fg = "brightYellow"

[json.bool]
fg = "brightMagenta"

[json.null]
fg = "brightBlack"

[json.punct]
fg = "white"

[json.fold]
fg = "brightBlack"

[json.match]
fg = "black"
bg = "yellow"

[json.match.current]
fg    = "black"
bg    = "brightYellow"
attrs = "bold"

# --- KV editor tables ----------------------------------------------------------
[table.header]
fg    = "brightWhite"
attrs = "bold"

[table.row.disabled]
fg    = "brightBlack"
attrs = "dim"

# --- test rows -----------------------------------------------------------------
[test.pass]
fg    = "brightGreen"
attrs = "bold"

[test.fail]
fg    = "brightRed"
attrs = "bold"

[test.summary]
fg = "brightWhite"

# --- sidebar -------------------------------------------------------------------
[sidebar.folder]
fg    = "brightBlue"
attrs = "bold"

[sidebar.request]
fg = "white"

[sidebar.selected]
fg = "black"
bg = "cyan"

# --- history -------------------------------------------------------------------
[history.row]
fg = "white"

[history.row.status]
fg = "brightBlack"

# --- dialogs -------------------------------------------------------------------
[dialog.title]
fg    = "brightWhite"
attrs = "bold"

[dialog.hint]
fg = "brightBlack"

# --- fields --------------------------------------------------------------------
[field.secret]
fg    = "brightBlack"
attrs = "dim"

[field.invalid]
fg    = "brightRed"
attrs = "bold"

# --- palette -------------------------------------------------------------------
[palette.match]
fg    = "brightCyan"
attrs = "bold"

# --- status line ---------------------------------------------------------------
[statusline.inflight]
fg = "brightYellow"

[statusline.meta]
fg = "brightBlack"

# --- shipped-component base overrides ------------------------------------------
# The two chrome bars use the shipped ContentBar, which resolves this one key.
[contentbar]
fg = "brightWhite"
bg = "brightBlack"
